name: Balena

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: balena-preview-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  balena_preview:
    runs-on: ubuntu-latest
    env:
      BALENA_FLEET: ${{ secrets.BALENA_FLEET }}
      BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute balena release metadata
        id: meta
        shell: bash
        run: |
          slugify() {
            printf '%s' "$1" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          branch_name="${{ github.event.pull_request.head.ref }}"
          branch_slug="$(slugify "${branch_name}")"
          if [[ -z "${branch_slug}" ]]; then
            branch_slug="preview"
          fi

          preview_name="pr-${{ github.event.pull_request.number }}-${branch_slug}"

          printf 'name=%s\n' "${preview_name}" >> "${GITHUB_OUTPUT}"
          printf 'source=pull_request\n' >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install balena CLI
        run: npm install --global balena-cli

      - name: Log in to balena
        run: balena login --token "${BALENA_TOKEN}"

      - name: Push pull request preview to balena
        run: |
          balena push "${BALENA_FLEET}" \
            --draft \
            --note "${{ steps.meta.outputs.name }}" \
            --release-tag name "${{ steps.meta.outputs.name }}" \
            --release-tag source "${{ steps.meta.outputs.source }}" \
            --release-tag pr "${{ github.event.pull_request.number }}" \
            --release-tag branch "${{ github.event.pull_request.head.ref }}" \
            --release-tag sha "${{ github.sha }}"
