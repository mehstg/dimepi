name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  balena_release:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      BALENA_FLEET: ${{ secrets.BALENA_FLEET }}
      BALENA_TOKEN: ${{ secrets.BALENA_TOKEN }}
      BALENA_RELEASE_NAME: ${{ needs.release_please.outputs.tag_name }}
      BALENA_RELEASE_SHA: ${{ needs.release_please.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BALENA_RELEASE_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install balena CLI
        run: npm install --global balena-cli

      - name: Log in to balena
        run: balena login --token "${BALENA_TOKEN}"

      - name: Push final release to balena
        run: |
          balena push "${BALENA_FLEET}" \
            --note "${BALENA_RELEASE_NAME}" \
            --release-tag name "${BALENA_RELEASE_NAME}" \
            --release-tag source "release-please" \
            --release-tag release "${BALENA_RELEASE_NAME}" \
            --release-tag sha "${BALENA_RELEASE_SHA}"
